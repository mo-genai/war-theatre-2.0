<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ما تراه ليس حربًا — مآلات</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- خطوط ميم الرسمية للعناوين والروابط (IBM Plex) وللنصوص (Noto) -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <style>
   :root {
      /* ألوان ميم الأصلية المستخرجة بدقة */
      --bg: #f4fafb;
      --fg: #2c1f00;
      --title-color: #633215; /* لون العنوان البني المائل للذهبي */
      --muted: #5d4f33;
      --rule: #e5ecef;
      --blockquote-bg: #e2edf1;
      --blockquote-border: #a8bec8;
      
      --search-border: #2c1f00;
      --toggle-track: #d9d9d9;
      --toggle-border: #2c1f00;
      --toggle-thumb: #000000;
      --highlight: #cce0ea;
    }
    .dark {
      --bg: #1c170e;
      --fg: #e2f9fd;
      --title-color: #e2f9fd;
      --muted: #a8a090;
      --rule: #362d1c;
      --blockquote-bg: #2a2315;
      --blockquote-border: #4d4026;
      
      --search-border: #e2f9fd;
      --toggle-track: #362d1c;
      --toggle-border: #e2f9fd;
      --toggle-thumb: #e2f9fd;
      --highlight: #4d4026;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Noto Sans Arabic', sans-serif;
      font-weight: 400;
      transition: background-color 0.35s, color 0.35s;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      top: 0; right: 0;
      height: 2px;
      width: 0%;
      background: var(--fg);
      opacity: 0.35;
      z-index: 600;
      transition: width 0.08s linear;
      pointer-events: none;
    }

    /* ── Topbar (مطابق للمسافات الواسعة في ميم) ── */
    #topbar {
      position: relative; /* في ميم يتحرك مع الصفحة وليس ثابتاً */
      background-color: transparent;
      padding: 2.5rem 2rem 2rem;
      transition: opacity 0.3s ease;
    }

    #topbar-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      gap: 1rem;
    }

    /* اليمين: الروابط */
    .topbar-right { display: flex; align-items: center; justify-content: flex-start; gap: 1.5rem; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 1.125rem;
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.3s;
    }
    .nav-links a:hover { opacity: 0.7; }

    /* الوسط: اللوجو */
    .topbar-mid { display: flex; align-items: center; justify-content: center; }
    .logo-img {
      height: 60px; /* مقاس لوجو ميم */
      width: auto;
      display: block;
      transition: filter 0.35s;
      /* حماية اللوجو من النسخ */
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .dark .logo-img { filter: invert(1) brightness(0.9); }

    /* اليسار: البحث والوضع الليلي */
    .topbar-left { display: flex; align-items: center; justify-content: flex-end; gap: 1.5rem; }

    /* ── Search ── */
    .search-wrap { flex-shrink: 0; position: relative; }
    #search-input {
      width: 180px;
      height: 1.75rem;
      padding: 0 0.75rem;
      background-color: transparent;
      border: 1px solid var(--search-border);
      color: var(--fg);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.85rem;
      border-radius: 4px;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s, color 0.35s;
    }
    #search-input::placeholder { color: var(--fg); opacity: 0.6; }
    #search-count { font-size: 0.65rem; color: var(--muted); position: absolute; top: 100%; right: 0; padding-top: 0.2rem; }

    /* ── Toggle (مطابق لميم 100%) ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      direction: ltr; /* ليكون الزر على اليسار والنص على اليمين */
    }
    .toggle-label {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.95rem;
      color: var(--fg);
      font-weight: 500;
      white-space: nowrap;
      direction: rtl;
      line-height: 1;
    }
    .toggle-track {
      width: 42px;
      height: 22px;
      border-radius: 50px;
      border: 1.5px solid var(--toggle-border);
      background-color: var(--toggle-track);
      position: relative;
      transition: background-color 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }
    .toggle-thumb {
      position: absolute;
      top: 50%;
      right: 3px;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: var(--toggle-thumb);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), background-color 0.35s;
    }
    .toggle-track.on .toggle-thumb { transform: translate(-19px, -50%); }

    /* ── Hamburger (mobile only) ── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0; }
    .menu-icon-wrapper { display: flex; flex-direction: column; gap: 8px; justify-content: center; align-items: center; }
    .menu-icon-line { width: 24px; height: 3px; background-color: var(--fg); transition: background-color 0.35s; }

    .d-only { display: flex; }
    .m-only { display: none; }

    /* ── Main content ── */
    main { max-width: 950px; margin: 0 auto; padding: 1.5rem 2rem 8rem; }

    /* ── Hero Figure (الصورة الممتدة مثل ميم) ── */
    .hero-figure {
      position: relative;
      margin: 0 0 3rem;
      border-radius: 6px;
      overflow: hidden;
      line-height: 0;
      width: 100%;
      height: 23.125rem; /* الارتفاع الدقيق في موقع ميم */
      box-shadow: none; /* إزالة الظل ليصبح مسطحاً ومطابقاً */
    }
    .hero-figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Header ── */
    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    h1 {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--title-color); /* لون العنوان البني */
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }

    .subtitle {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--fg);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    /* ── Article meta (التاريخ والكاتب مثل ميم بدون أيقونات) ── */
    .article-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem; /* مسافات واسعة بين الكلمات */
      flex-wrap: wrap;
      direction: rtl;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
    }
    .meta-item {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Content styles ── */
    hr.divider { border: none; border-top: 1px solid var(--rule); margin: 2.6rem 0; }
    p { font-size: 1.05rem; font-weight: 400; line-height: 2; margin-bottom: 1.5rem; text-align: justify; }
    p:last-child { margin-bottom: 0; }
    strong { font-weight: 700; }

    footer {
      margin-top: 5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .byline { font-family: 'IBM Plex Sans Arabic', sans-serif; font-size: 0.85rem; color: var(--muted); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      html { font-size: 15px; }
      main { padding: 1.5rem 1.25rem 6rem; }
      h1 { font-size: 1.8rem; }
      .hero-figure { height: 250px; }

      #topbar { padding: 1.5rem 1.25rem 1rem; }
      #topbar-inner {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .topbar-right { width: auto; justify-content: flex-start; }
      .topbar-mid   { position: absolute; left: 50%; transform: translateX(-50%); }
      .topbar-left  { width: auto; justify-content: flex-end; }

      .d-only { display: none !important; }
      .m-only { display: flex !important; }
      .m-only-block { display: block !important; }

      .hamburger { display: flex; }
      .logo-img { height: 45px; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <div id="topbar">
    <div id="topbar-inner">

      <!-- SLOT RIGHT: Desktop=Links | Mobile=logo(hidden if centered) -->
      <div class="topbar-right">
        <nav class="nav-links d-only">
          <a href="#">محتوى مقروء</a>
          <a href="#">تعرف علينا</a>
          <a href="#">اكتب معنا</a>
        </nav>
      </div>

      <!-- SLOT MID: Logo -->
      <div class="topbar-mid">
        <img class="logo-img" src="malat2.png" alt="مآلات" />
      </div>

      <!-- SLOT LEFT: Desktop=Search+Toggle | Mobile=Hamburger -->
      <div class="topbar-left">
        <div class="search-wrap d-only">
          <input type="text" id="search-input" placeholder="أبحث هنا .." autocomplete="off" />
          <div id="search-count"></div>
        </div>
        
        <div class="toggle-wrap d-only" onclick="toggleDark()">
          <div class="toggle-track" id="toggle-track-d">
            <div class="toggle-thumb"></div>
          </div>
          <span class="toggle-label">الوضع الليلي</span>
        </div>

        <button class="hamburger m-only" aria-label="القائمة">
          <div class="menu-icon-wrapper">
            <div class="menu-icon-line"></div>
            <div class="menu-icon-line"></div>
          </div>
        </button>
      </div>

    </div>
  </div>

  <main>

    <figure class="hero-figure" aria-label="صورة توضيحية">
      <img
        src="https://www.stimson.org/wp-content/uploads/2024/07/Middle-East-Soldiers-on-Map.jpg"
        alt="جنود على خريطة الشرق الأوسط"
        loading="eager"
      />
    </figure>

    <header>
      <h1>ما تراه ليس حربًا</h1>
      <div class="article-meta">
        <span class="meta-item">عمر آل عبد الهادي</span>
        <span class="meta-item">9 أبريل 2026</span>
      </div>
    </header>

    <p>
      من أبرز الظواهر الأدبية في الشعر الجاهلي - والتي استمرت في عصور لاحقة - الوقوف على الأطلال: اللحظة التي يقف فيها الشاعر أمام آثار دياره أو ديار محبوبته...
    </p>

    <footer>
      <span class="byline">Compiled and Adapted by Mohammed Al-Otaibi</span>
    </footer>

  </main>

  <script>
    let dark = false;
    function toggleDark() {
      dark = !dark;
      document.body.classList.toggle('dark', dark);
      document.querySelectorAll('.toggle-track').forEach(t => t.classList.toggle('on', dark));
    }

    var progressBar = document.getElementById('progress-bar');
    var lastY = 0, ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          var y = window.scrollY;
          var h = document.documentElement.scrollHeight - window.innerHeight;
          if (h > 0) progressBar.style.width = Math.min((y / h) * 100, 100) + '%';
          lastY = y;
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    var input = document.getElementById('search-input');
    var countEl = document.getElementById('search-count');
    var hits = [], cur = 0, timer;
    var mainEl = document.querySelector('main');
    var originalHTML = '';

    window.addEventListener('DOMContentLoaded', function() { originalHTML = mainEl.innerHTML; });

    function clearHL() { mainEl.innerHTML = originalHTML; hits = []; cur = 0; countEl.textContent = ''; }

    function doSearch(q) {
      clearHL();
      if (!q.trim()) return;
      var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var walker = document.createTreeWalker(mainEl, NodeFilter.SHOW_TEXT);
      var nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(function(node) {
        var text = node.textContent;
        re.lastIndex = 0;
        if (!re.test(text)) return;
        re.lastIndex = 0;
        var frag = document.createDocumentFragment();
        var last = 0, m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          var mark = document.createElement('mark');
          mark.className = 'search-hit';
          mark.textContent = m[0];
          frag.appendChild(mark);
          hits.push(mark);
          last = re.lastIndex;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
      if (hits.length) {
        hits[0].classList.add('current');
        hits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = '١ من ' + hits.length;
      }
    }

    if (input) {
      input.addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(function() { doSearch(input.value); }, 280);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' || !hits.length) return;
        hits[cur].classList.remove('current');
        cur = (cur + 1) % hits.length;
        hits[cur].classList.add('current');
        hits[cur].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = (cur + 1) + ' من ' + hits.length;
      });
    }
  </script>
</body>
</html>
