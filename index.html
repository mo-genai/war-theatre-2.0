<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ما تراه ليس حربًا — مآلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;900&display=swap" rel="stylesheet" />

  <style>
    /* ── إخفاء الصفحة أثناء التحميل لمنع الوميض ── */
    body.hidden { visibility: hidden; opacity: 0; }
    body { transition: opacity 0.3s ease, visibility 0.3s ease; }
  </style>

  <script>
    /* تطبيق الوضع الليلي قبل رسم الصفحة */
    (function () {
      var body = document.body || document.documentElement;
      body.classList.add('hidden');
      if (localStorage.getItem('darkMode') === 'enabled') {
        document.documentElement.classList.add('dark-mode-preload');
      }
    })();
  </script>

  <style>
    /* ══════════════════════════════════════
       المتغيرات
    ══════════════════════════════════════ */
    :root {
      --bg:               #edf3f6;
      --fg:               #261a0b;
      --muted:            #7a6a52;
      --rule:             #c2d0d6;
      --blockquote-bg:    #e2edf1;
      --blockquote-border:#a8bec8;
      --search-bg:        #f5f9fb;
      --search-border:    #c2d0d6;
      --highlight:        #cce0ea;
      --topbar-bg:        #edf3f6;
    }
    .dark-mode {
      --bg:               #0f0f0d;
      --fg:               #e8e3d8;
      --muted:            #8a8278;
      --rule:             #2a2a26;
      --blockquote-bg:    #161612;
      --blockquote-border:#3a3a34;
      --search-bg:        #1a1a16;
      --search-border:    #2e2e28;
      --highlight:        #2e2e22;
      --topbar-bg:        #0f0f0d;
    }
    /* تطبيق مبكر لمنع الوميض */
    html.dark-mode-preload body,
    html.dark-mode-preload #topbar {
      background-color: #0f0f0d !important;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 17px; scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Noto Sans Arabic', sans-serif;
      font-weight: 400;
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       شريط التنقل — هيكل ميم الدقيق
    ══════════════════════════════════════ */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      background-color: var(--topbar-bg);
      transition: background-color 0.3s ease;
      /* لا يخفي عند التمرير — مطابق لميم */
    }

    /* المحتوى الداخلي للشريط */
    #topbar-inner {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 68px;          /* ارتفاع الشريط كميم */
    }

    /* ── الجانب الأيمن: روابط التنقل (فارغة في مآلات) ── */
    .navbar_links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      /* في مآلات لا توجد روابط حاليًا — نبقي المساحة */
      min-width: 0;
      flex: 1;
    }
    .navbar_link {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--fg);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .navbar_link:hover { opacity: 1; }

    /* ── الوسط: اللوجو ── */
    .navbar_logo {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-img {
      height: 48px;          /* مطابق لحجم لوجو ميم على الديسكتوب */
      width: auto;
      display: block;
      transition: opacity 0.2s;
    }
    .dark-mode .logo-img { filter: invert(1) brightness(0.9); }

    /* ── الجانب الأيسر: أدوات (بحث + تبديل + همبرجر) ── */
    .navbar_tools-wrapper {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 1rem;
      flex: 1;
    }

    /* ═══════════════════════════════════════
       بحث — مطابق لميم
    ═══════════════════════════════════════ */
    .navbar_search-wrapper {
      display: flex;
      align-items: center;
      gap: 0;
    }
    #search-input {
      width: 160px;
      padding: 0.3rem 0.65rem;
      background: var(--search-bg);
      border: 1px solid var(--search-border);
      border-radius: 5px 0 0 5px;
      color: var(--fg);
      font-family: 'Noto Sans Arabic', sans-serif;
      font-size: 0.75rem;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s, background 0.3s;
    }
    #search-input::placeholder { color: var(--muted); opacity: 0.7; }
    #search-input:focus { border-color: var(--muted); }
    #search-count {
      font-size: 0.63rem;
      color: var(--muted);
      padding: 0 0.35rem;
      min-width: 2.5rem;
      text-align: center;
    }
    mark.search-hit {
      background: var(--highlight);
      color: var(--fg);
      border-radius: 2px;
      padding: 0 1px;
    }
    mark.search-hit.current { outline: 1px solid var(--muted); }

    /* ═══════════════════════════════════════
       تبديل الوضع الليلي — مطابق لميم حرفيًا
    ═══════════════════════════════════════ */
    .navbar_mode-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      color: var(--fg);
      direction: rtl;        /* النص على اليمين، الـ pill على اليسار */
      flex-shrink: 0;
    }

    .navbar_mode-text {
      font-size: 0.8rem;
      font-weight: 400;
      white-space: nowrap;
      color: var(--fg);
      transition: color 0.3s;
    }

    .navbar_mode-button-wrapper {
      width: 40px;
      height: 20px;
      border-radius: 999px;
      border: 1.5px solid var(--fg);
      background-color: #cdd3d6;
      position: relative;
      flex-shrink: 0;
      transition: background-color 0.3s, border-color 0.3s;
      overflow: hidden;
    }

    .navbar_mode-button {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #261a0b;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateX(0%);     /* الوضع النهاري: الكرة على اليمين */
    }

    /* الوضع الليلي: الكرة تنزلق إلى اليسار */
    .dark-mode .navbar_mode-button {
      transform: translateX(-110%);
    }

    /* ═══════════════════════════════════════
       همبرجر — مطابق لميم (خطان فقط)
    ═══════════════════════════════════════ */
    .navbar_menu-button {
      display: none;         /* يظهر على الجوال فقط */
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
    }
    .menu_icon-line {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--fg);
      border-radius: 2px;
      transition: background 0.3s;
    }

    /* ═══════════════════════════════════════
       شريط التقدم — أسفل الـ topbar مطابق لميم
    ═══════════════════════════════════════ */
    .navbar_line-scroll-wrapper {
      width: 100%;
      height: 2px;
      background: transparent;
    }
    .navbar_line-scroll {
      height: 2px;
      width: 0%;
      background: var(--fg);
      opacity: 0.35;
      transition: width 0.08s linear;
      will-change: width;
    }

    /* ══════════════════════════════════════
       المحتوى الرئيسي
    ══════════════════════════════════════ */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 5.5rem 2rem 10rem;
    }

    /* ── صورة Hero ── */
    .hero-figure {
      position: relative;
      margin: 0 0 2.8rem;
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
      box-shadow: 0 4px 28px rgba(0,0,0,0.12);
    }
    .hero-figure img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }

    /* ── رأس المقالة ── */
    header { margin-bottom: 1.6rem; text-align: center; }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 0.45rem;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .article-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      direction: rtl;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }
    .meta-item svg {
      width: 13px; height: 13px;
      stroke: var(--muted);
      fill: none;
      flex-shrink: 0;
      opacity: 0.75;
    }

    /* ── محتوى المقالة ── */
    hr.divider { border: none; border-top: 1px solid var(--rule); margin: 2.6rem 0; }
    section { margin-bottom: 0; }
    h2 { font-size: 1.05rem; font-weight: 900; margin-bottom: 1.2rem; line-height: 1.55; }
    p  { font-size: 0.98rem; font-weight: 400; line-height: 2; margin-bottom: 1rem; }
    p:last-child { margin-bottom: 0; }
    strong { font-weight: 500; }

    blockquote {
      margin: 1.8rem 0;
      padding: 1rem 1.3rem;
      background: var(--blockquote-bg);
      border-right: 3px solid var(--blockquote-border);
      border-radius: 0 4px 4px 0;
      transition: background 0.3s, border-color 0.3s;
    }
    blockquote p { font-size: 0.95rem; line-height: 1.85; margin-bottom: 0; }

    .sub-heading { font-weight: 500; font-size: 0.93rem; margin-top: 1.5rem; margin-bottom: 0.45rem; }

    /* ── تذييل ── */
    footer {
      margin-top: 5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .byline { font-size: 0.82rem; color: var(--muted); font-style: normal; }
    .x-link {
      display: flex; align-items: center; justify-content: center;
      opacity: 0.4; transition: opacity 0.2s;
      text-decoration: none; color: var(--muted); flex-shrink: 0;
    }
    .x-link:hover { opacity: 0.8; }
    .x-link svg { width: 20px; height: 20px; fill: var(--muted); transition: fill 0.3s; }

    /* ══════════════════════════════════════
       الجوال — مطابق لميم
    ══════════════════════════════════════ */
    @media (max-width: 767px) {
      html { font-size: 15px; }
      main { padding: 4.8rem 1.3rem 8rem; }
      h1   { font-size: 1.65rem; }

      #topbar-inner {
        padding: 0 1rem;
        height: 56px;
      }

      /* على الجوال: إخفاء البحث والنص فقط في التبديل */
      .navbar_search-wrapper { display: none; }
      .navbar_mode-text      { display: none; }

      /* إظهار الهمبرجر */
      .navbar_menu-button { display: flex; }

      /* حجم اللوجو على الجوال */
      .logo-img { height: 35px; }
    }

    /* إخفاء الهمبرجر على الديسكتوب */
    @media (min-width: 768px) {
      .navbar_menu-button { display: none; }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════
       شريط التنقل — هيكل ميم الدقيق
  ════════════════════════════════════════ -->
  <div id="topbar">
    <div id="topbar-inner">

      <!-- الجانب الأيمن: روابط التنقل (فارغ لأن مآلات ليس لها روابط) -->
      <nav class="navbar_links">
        <!-- يمكن إضافة روابط هنا لاحقًا -->
      </nav>

      <!-- الوسط: اللوجو -->
      <a href="/" class="navbar_logo">
        <img src="malat2.png" alt="مآلات" class="logo-img" />
      </a>

      <!-- الجانب الأيسر: الأدوات -->
      <div class="navbar_tools-wrapper">

        <!-- حقل البحث (يخفى على الجوال) -->
        <div class="navbar_search-wrapper">
          <input type="text" id="search-input" placeholder="أبحث هنا .." autocomplete="off" />
          <div id="search-count"></div>
        </div>

        <!-- تبديل الوضع الليلي — مطابق لميم حرفيًا -->
        <a href="#" class="navbar_mode-wrapper" id="dark-mode-toggle" aria-label="تبديل الوضع الليلي">
          <div class="navbar_mode-text">الوضع الليلي</div>
          <div class="navbar_mode-button-wrapper">
            <div class="navbar_mode-button" id="navbar_mode-button"></div>
          </div>
        </a>

        <!-- همبرجر — مطابق لميم (خطان) -->
        <button class="navbar_menu-button" aria-label="القائمة">
          <div class="menu_icon-line"></div>
          <div class="menu_icon-line"></div>
        </button>

      </div>
    </div>

    <!-- شريط التقدم — أسفل الـ topbar مثل ميم -->
    <div class="navbar_line-scroll-wrapper">
      <div class="navbar_line-scroll" id="progress-bar"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       المحتوى الرئيسي
  ════════════════════════════════════════ -->
  <main>

    <figure class="hero-figure" aria-label="صورة توضيحية">
      <img
        src="https://www.stimson.org/wp-content/uploads/2024/07/Middle-East-Soldiers-on-Map.jpg"
        alt="جنود على خريطة الشرق الأوسط"
        loading="eager"
      />
    </figure>

    <header>
      <h1>ما تراه ليس حربًا</h1>
      <p class="subtitle">قراءة في بنية القوة العالمية وإعادة تشكيل الشرق الأوسط</p>
      <div class="article-meta">
        <span class="meta-item">
          <svg viewBox="0 0 24 24" stroke-width="1.7" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          2026-03-31
        </span>
        <span class="meta-item">
          <svg viewBox="0 0 24 24" stroke-width="1.7" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15 15"/>
          </svg>
          قراءة ١٥ دقيقة
        </span>
      </div>
    </header>

    <!-- ضع محتوى المقال هنا -->

    <footer>
      <span class="byline">Compiled and Adapted by Mohammed Al-Otaibi</span>
      <a href="https://x.com/YOUR_X_HANDLE" target="_blank" rel="noopener noreferrer" class="x-link" aria-label="X">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-7.731zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
    </footer>

  </main>

  <!-- ════════════════════════════════════════
       JavaScript — منطق ميم الدقيق
  ════════════════════════════════════════ -->
  <script>
    /* ── إزالة إخفاء الصفحة بعد التحميل ── */
    window.addEventListener('load', function () {
      document.body.classList.remove('hidden');
    });

    /* ════════════════════════════════
       الوضع الليلي — مطابق لميم تمامًا
       (localStorage + dark-mode class)
    ════════════════════════════════ */
    var body = document.body;

    /* تطبيق الوضع المحفوظ فور تحميل الـ DOM */
    if (localStorage.getItem('darkMode') === 'enabled') {
      body.classList.add('dark-mode');
    }
    document.documentElement.classList.remove('dark-mode-preload');

    document.addEventListener('DOMContentLoaded', function () {
      var toggleBtn = document.getElementById('dark-mode-toggle');

      toggleBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (body.classList.contains('dark-mode')) {
          body.classList.remove('dark-mode');
          localStorage.setItem('darkMode', 'disabled');
        } else {
          body.classList.add('dark-mode');
          localStorage.setItem('darkMode', 'enabled');
        }
      });
    });

    /* ════════════════════════════════
       شريط التقدم — أسفل الـ topbar مثل ميم
    ════════════════════════════════ */
    var progressBar = document.getElementById('progress-bar');
    var ticking = false;

    window.addEventListener('scroll', function () {
      if (!ticking) {
        requestAnimationFrame(function () {
          var y = window.scrollY;
          var h = document.documentElement.scrollHeight - window.innerHeight;
          if (h > 0) {
            progressBar.style.width = Math.min((y / h) * 100, 100) + '%';
          }
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    /* ════════════════════════════════
       البحث — مطابق لمآلات الأصلي
    ════════════════════════════════ */
    var searchInput = document.getElementById('search-input');
    var countEl     = document.getElementById('search-count');
    var hits = [], cur = 0, searchTimer;
    var mainEl = document.querySelector('main');
    var originalHTML = '';

    document.addEventListener('DOMContentLoaded', function () {
      originalHTML = mainEl.innerHTML;
    });
    if (document.readyState !== 'loading') {
      originalHTML = mainEl.innerHTML;
    }

    function clearHL() {
      mainEl.innerHTML = originalHTML;
      hits = []; cur = 0; countEl.textContent = '';
    }

    function doSearch(q) {
      clearHL();
      if (!q.trim()) return;
      var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var walker = document.createTreeWalker(mainEl, NodeFilter.SHOW_TEXT);
      var nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(function (node) {
        var text = node.textContent;
        re.lastIndex = 0;
        if (!re.test(text)) return;
        re.lastIndex = 0;
        var frag = document.createDocumentFragment();
        var last = 0, m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          var mark = document.createElement('mark');
          mark.className = 'search-hit';
          mark.textContent = m[0];
          frag.appendChild(mark);
          hits.push(mark);
          last = re.lastIndex;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
      if (hits.length) {
        hits[0].classList.add('current');
        hits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = '١ من ' + hits.length;
      } else {
        countEl.textContent = 'لا نتائج';
      }
    }

    if (searchInput) {
      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function () { doSearch(searchInput.value); }, 280);
      });
      searchInput.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' || !hits.length) return;
        hits[cur].classList.remove('current');
        cur = (cur + 1) % hits.length;
        hits[cur].classList.add('current');
        hits[cur].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = (cur + 1) + ' من ' + hits.length;
      });
    }
  </script>
</body>
</html>
