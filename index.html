<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ما تراه ليس حربًا — مآلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Topbar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      background-color: var(--topbar-bg);
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--rule);
      transition: background-color 0.35s, transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    }
    #topbar.hidden { transform: translateY(-110%); opacity: 0; }

    /* Desktop: 3-column grid — right=Links | center=logo | left=toggle+search */
    #topbar-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      gap: 1rem;
    }

    /* Direction in RTL: right is the start, left is the end */
    .topbar-right { display: flex; align-items: center; justify-content: flex-start; gap: 1.5rem; }
    .topbar-mid   { display: flex; align-items: center; justify-content: center; }
    .topbar-left  { display: flex; align-items: center; justify-content: flex-end; gap: 1rem; }

    /* ── Nav Links (Like Meem) ── */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-links a {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 1.125rem;
      color: var(--fg);
      text-decoration: none;
      font-weight: 400;
      transition: color 0.3s;
    }
    .nav-links a:hover { opacity: 0.7; }

    /* ── Logo Protection ── */
    .logo-img {
      height: 70px; /* مقاس مناسب ومتناسق */
      width: auto;
      display: block;
      transition: opacity 0.2s;
      /* أكواد الحماية من النسخ والحفظ */
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }
    .dark .logo-img { filter: invert(1) brightness(0.9); }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      direction: rtl;
    }
    .toggle-label {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.875rem;
      color: var(--fg);
      font-weight: 400;
      white-space: nowrap;
      line-height: 1;
    }  
    .toggle-track {
      width: 2rem;
      height: 1rem;
      border-radius: 4px;
      border: 1px solid var(--fg);
      background-color: #d9d9d9;
      position: relative;
      transition: background-color 0.3s, border-color 0.3s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .dark .toggle-track { background-color: var(--toggle-track); border-color: transparent; }
    .toggle-thumb {
      position: absolute;
      top: 50%;
      right: 3px;
      transform: translateY(-50%);
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 2px;
      background-color: var(--fg);
      transition: transform 0.28s, background-color 0.35s;
    }
    .toggle-track.on .toggle-thumb { transform: translate(-14px, -50%); }

    /* ── Search ── */
    .search-wrap { flex-shrink: 0; position: relative; display: flex; align-items: center; }
    #search-input {
      width: 160px;
      height: 1.5rem;
      padding: 0 0.5rem;
      background-color: transparent;
      border: 1px solid var(--fg);
      color: var(--fg);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.875rem;
      font-weight: 400;
      border-radius: 4px;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s, background-color 0.35s, color 0.35s;
    }
    #search-input::placeholder { color: var(--fg); opacity: 0.7; }
    #search-input:focus { border-color: var(--muted); }
    #search-count { font-size: 0.63rem; color: var(--muted); position: absolute; top: 100%; right: 0; padding-top: 0.2rem; }

    /* ── Hamburger (Mobile Menu exactly like Meem) ── */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .menu-icon-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.625rem; /* 10px spacing */
      justify-content: center;
      align-items: center;
    }
    .menu-icon-line {
      width: 1.5rem; /* 24px width */
      height: 3px;
      background-color: var(--fg);
      transition: background-color 0.35s;
    }

    /* ── Hero Figure (الصورة ممدودة مثل ميم) ── */
    .hero-figure {
      position: relative;
      margin: 0 0 2.8rem;
      border-radius: 4px; /* زوايا ناعمة مثل ميم */
      overflow: hidden;
      line-height: 0;
      width: 100%;
      height: 370px; /* الارتفاع الدقيق في ميم 23.125rem */
      box-shadow: none; /* إلغاء الظل لتبدو مسطحة مثلهم */
    }
    .hero-figure img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* لتمتد الصورة وتغطي المساحة بدون أن تتشوه */
      display: block;
    }

    /* ── Article meta (التاريخ والقراءة) ── */
    .article-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      direction: rtl;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      padding-bottom: 1.5rem; /* تنزيل النص ووضع مسافة للخط */
      margin-top: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--rule); /* الخط السفلي الفاصل */
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 600px) {
      .hero-figure { height: 250px; } /* صورة طبيعية في الجوال */
      
      #topbar-inner {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .topbar-right { width: auto; justify-content: flex-start; }
      .topbar-mid   { display: none; } /* إخفاء المنتصف في الجوال إن لم يحتج */
      .topbar-left  { width: auto; justify-content: flex-end; }
    }

    .topbar-left  { display: flex; align-items: center; justify-content: flex-start; gap: 0.85rem; }
    .topbar-mid   { display: flex; align-items: center; justify-content: center; }
    .topbar-right { display: flex; align-items: center; justify-content: flex-end; }

    /* ── Logo ── */
    .logo-img {
      height: 75px;
      width: auto;
      display: block;
      transition: opacity 0.2s;
    }
    .dark .logo-img {
      filter: invert(1) brightness(0.9);
    }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      direction: rtl;
    }
    .toggle-label {
      font-size: 0.875rem;
      color: var(--fg);
      font-weight: 400;
      white-space: nowrap;
      line-height: 1;
    }  
    .toggle-track {
      width: 2rem;
      height: 1rem;
      border-radius: 10px;
      border: 1px solid var(--fg);
      background-color: #d9d9d9;
      position: relative;
      transition: background-color 0.3s, border-color 0.3s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .dark .toggle-track { background-color: var(--toggle-track); }
    .toggle-thumb {
      position: absolute;
      top: 50%;
      right: 3px;
      transform: translateY(-50%);
      width: 0.625rem;
      height: 0.625rem;
      border-radius: 4px;
      background-color: var(--fg);
      transition: transform 0.28s, background-color 0.35s;
      box-shadow: none;
    }
    .toggle-track.on .toggle-thumb { transform: translate(-14px, -50%); }

    /* ── Search ── */
    .search-wrap { 
      flex-shrink: 0; 
      position: relative; 
      display: flex; 
      align-items: center; 
    }
    #search-input {
      width: 160px;
      height: 1.5rem;
      padding: 0 0.5rem;
      background-color: transparent;
      border: 1px solid var(--fg);
      color: var(--fg);
      font-family: 'Noto Sans Arabic', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      border-radius: 4px;
      outline: none;
      direction: rtl;
      transition: border-color 0.2s, background-color 0.35s, color 0.35s;
    }
    #search-input::placeholder { color: var(--fg); opacity: 0.7; }
    #search-input:focus { border-color: var(--muted); }
    #search-count { 
      font-size: 0.63rem; 
      color: var(--muted); 
      position: absolute;
      top: 100%;
      right: 0;
      padding-top: 0.2rem;
    }

    /* ── Hamburger (mobile only) ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0px;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--fg);
      border-radius: 2px;
      transition: background 0.35s;
    }

    .d-only { display: flex; }
    .m-only { display: none; }

    /* ── Main content ── */
    main { max-width: 1000px; margin: 0 auto; padding: 5.5rem 2rem 10rem; }

    /* ── Hero Figure ── */
    .hero-figure {
      position: relative;
      margin: 0 0 2.8rem;
      border-radius: 10px;
      overflow: hidden;
      line-height: 0;
      box-shadow: 0 4px 28px rgba(0,0,0,0.12);
    }
    .hero-figure img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 1.6rem;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 0.45rem;
    }

    .subtitle {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    /* ── Article meta ── */
    .article-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      direction: rtl;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 400;
    }
    .meta-item svg {
      width: 13px; height: 13px;
      stroke: var(--muted);
      fill: none;
      flex-shrink: 0;
      opacity: 0.75;
    }

    /* ── Content styles ── */
    hr.divider { border: none; border-top: 1px solid var(--rule); margin: 2.6rem 0; }
    section { margin-bottom: 0; }
    h2 { font-size: 1.05rem; font-weight: 900; margin-bottom: 1.2rem; line-height: 1.55; }
    p { font-size: 0.98rem; font-weight: 400; line-height: 2; margin-bottom: 1rem; }
    p:last-child { margin-bottom: 0; }
    strong { font-weight: 500; }

    blockquote {
      margin: 1.8rem 0;
      padding: 1rem 1.3rem;
      background: var(--blockquote-bg);
      border-right: 3px solid var(--blockquote-border);
      border-radius: 0 4px 4px 0;
      transition: background 0.35s, border-color 0.35s;
    }
    blockquote p { font-size: 0.95rem; line-height: 1.85; margin-bottom: 0; }

    .sub-heading { font-weight: 500; font-size: 0.93rem; margin-top: 1.5rem; margin-bottom: 0.45rem; }

    footer {
      margin-top: 5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .byline { font-size: 0.82rem; color: var(--muted); font-style: normal; }
    .x-link {
      display: flex; align-items: center; justify-content: center;
      opacity: 0.4; transition: opacity 0.2s;
      text-decoration: none; color: var(--muted); flex-shrink: 0;
    }
    .x-link:hover { opacity: 0.8; }
    .x-link svg { width: 20px; height: 20px; fill: var(--muted); transition: fill 0.35s; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      html { font-size: 15px; }
      main { padding: 4.6rem 1.3rem 8rem; }
      h1 { font-size: 1.65rem; }

      #topbar { padding: 0.5rem 0.9rem; }

      #topbar-inner {
        position: relative;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 0;
      }

      .topbar-left  { width: 68px; flex-shrink: 0; justify-content: flex-start; }
      .topbar-mid   { position: absolute; left: 49.5%; transform: translateX(-50%); justify-content: center; }
      .topbar-right { flex-shrink: 0; justify-content: flex-end; }

      .d-only { display: none !important; }
      .m-only { display: flex !important; }
      .m-only-block { display: block !important; }

      .hamburger { display: flex; }

      .logo-img { height: 35px; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <div id="topbar">
    <div id="topbar-inner">

      <!-- SLOT RIGHT: Desktop=Links | Mobile=Logo -->
      <div class="topbar-right">
        <!-- Desktop: Nav Links -->
        <nav class="nav-links d-only">
          <a href="#">محتوى مقروء</a>
          <a href="#">تعرف علينا</a>
          <a href="#">اكتب معنا</a>
        </nav>
        
        <!-- Mobile: logo -->
        <img class="logo-img m-only-block" src="malat2.png" alt="مآلات" draggable="false" oncontextmenu="return false;" style="display:none;" />
      </div>

      <!-- SLOT MID: Desktop=Logo -->
      <div class="topbar-mid">
        <!-- Desktop: logo -->
        <img class="logo-img d-only" src="malat2.png" alt="مآلات" draggable="false" oncontextmenu="return false;" />
      </div>

      <!-- SLOT LEFT: Desktop=Toggle+Search | Mobile=Hamburger -->
      <div class="topbar-left">
        <!-- Desktop: toggle + search -->
        <div class="search-wrap d-only">
          <input type="text" id="search-input" placeholder="أبحث هنا .." autocomplete="off" />
          <div id="search-count"></div>
        </div>
        <div class="toggle-wrap d-only" onclick="toggleDark()">
          <span class="toggle-label">الوضع الليلي</span>
          <div class="toggle-track" id="toggle-track-d">
            <div class="toggle-thumb"></div>
          </div>
        </div>

        <!-- Mobile: Hamburger Menu -->
        <button class="hamburger m-only" aria-label="القائمة">
          <div class="menu-icon-wrapper">
            <div class="menu-icon-line"></div>
            <div class="menu-icon-line"></div>
          </div>
        </button>
      </div>

    </div>

      <!-- SLOT RIGHT: Desktop=empty | Mobile=hamburger -->
      <div class="topbar-right">
        <button class="hamburger" aria-label="القائمة">
          <span></span>
          <span></span>
        </button>
      </div>

    </div>
  </div>

  <main>

    <figure class="hero-figure" aria-label="صورة توضيحية">
      <img
        src="https://www.stimson.org/wp-content/uploads/2024/07/Middle-East-Soldiers-on-Map.jpg"
        alt="جنود على خريطة الشرق الأوسط"
        loading="eager"
      />
    </figure>

    <header>
      <h1>ما تراه ليس حربًا</h1>
      <p class="subtitle">قراءة في بنية القوة العالمية وإعادة تشكيل الشرق الأوسط</p>
      <div class="article-meta">
        <span class="meta-item">
          <svg viewBox="0 0 24 24" stroke-width="1.7" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          2026-03-31
        </span>
        <span class="meta-item">
          <svg viewBox="0 0 24 24" stroke-width="1.7" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9"/>
            <polyline points="12 7 12 12 15 15"/>
          </svg>
          قراءة ١٥ دقيقة
        </span>
      </div>
    </header>

    <!-- ضع محتوى المقال هنا -->

    <footer>
      <span class="byline">Compiled and Adapted by Mohammed Al-Otaibi</span>
      <a href="https://x.com/YOUR_X_HANDLE" target="_blank" rel="noopener noreferrer" class="x-link" aria-label="X">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-7.731zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>
    </footer>

  </main>

  <script>
    /* ── Dark Mode ── */
    let dark = false;

    function toggleDark() {
      dark = !dark;
      document.body.classList.toggle('dark', dark);
      document.querySelectorAll('.toggle-track').forEach(function(t) {
        t.classList.toggle('on', dark);
      });
    }

    /* ── Responsive layout ── */
    function applyLayout() {
      var isMobile = window.innerWidth <= 600;

      document.querySelectorAll('.d-only').forEach(function(el) {
        el.style.display = isMobile ? 'none' : (el.tagName === 'IMG' ? 'block' : 'flex');
      });
      document.querySelectorAll('.m-only').forEach(function(el) {
        el.style.display = isMobile ? 'flex' : 'none';
      });
      document.querySelectorAll('.m-only-block').forEach(function(el) {
        el.style.display = isMobile ? 'block' : 'none';
      });

      var ham = document.querySelector('.hamburger');
      if (ham) ham.style.display = isMobile ? 'flex' : 'none';
    }

    applyLayout();
    window.addEventListener('resize', applyLayout);

    /* ── Progress bar + topbar hide on scroll ── */
    var progressBar = document.getElementById('progress-bar');
    var topbar      = document.getElementById('topbar');
    var lastY = 0, ticking = false;

    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          var y = window.scrollY;
          var h = document.documentElement.scrollHeight - window.innerHeight;
          if (h > 0) progressBar.style.width = Math.min((y / h) * 100, 100) + '%';
          if (y > lastY && y > 80) topbar.classList.add('hidden');
          else topbar.classList.remove('hidden');
          lastY = y;
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    /* ── Search ── */
    var input   = document.getElementById('search-input');
    var countEl = document.getElementById('search-count');
    var hits = [], cur = 0, timer;
    var mainEl = document.querySelector('main');
    var originalHTML = '';

    window.addEventListener('DOMContentLoaded', function() { originalHTML = mainEl.innerHTML; });
    if (document.readyState !== 'loading') originalHTML = mainEl.innerHTML;

    function clearHL() { mainEl.innerHTML = originalHTML; hits = []; cur = 0; countEl.textContent = ''; }

    function doSearch(q) {
      clearHL();
      if (!q.trim()) return;
      var re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var walker = document.createTreeWalker(mainEl, NodeFilter.SHOW_TEXT);
      var nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(function(node) {
        var text = node.textContent;
        re.lastIndex = 0;
        if (!re.test(text)) return;
        re.lastIndex = 0;
        var frag = document.createDocumentFragment();
        var last = 0, m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          var mark = document.createElement('mark');
          mark.className = 'search-hit';
          mark.textContent = m[0];
          frag.appendChild(mark);
          hits.push(mark);
          last = re.lastIndex;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
      if (hits.length) {
        hits[0].classList.add('current');
        hits[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = '١ من ' + hits.length;
      } else {
        countEl.textContent = 'لا نتائج';
      }
    }

    if (input) {
      input.addEventListener('input', function() {
        clearTimeout(timer);
        timer = setTimeout(function() { doSearch(input.value); }, 280);
      });
      input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' || !hits.length) return;
        hits[cur].classList.remove('current');
        cur = (cur + 1) % hits.length;
        hits[cur].classList.add('current');
        hits[cur].scrollIntoView({ behavior: 'smooth', block: 'center' });
        countEl.textContent = (cur + 1) + ' من ' + hits.length;
      });
    }
  </script>
</body>
</html>
